# deploy/compose/modes/dev-jatos-only.yml
#
# Mode: JATOS-only for local integration work.
# App and app Postgres run on the host (or not at all).
#
# Usage (from repo root):
#   docker compose \
#     -f deploy/compose/base.yml \
#     -f deploy/compose/services/jatos-db.yml \
#     -f deploy/compose/services/jatos.yml \
#     -f deploy/compose/services/traefik.yml \
#     -f deploy/compose/modes/dev-jatos-only.yml \
#     up -d
#
# For HTTPS, append: -f deploy/compose/modes/dev-local-https.yml

services:
  jatos:
    labels:
      - "traefik.http.routers.jatos.rule=Host(`${JATOS_DOMAIN:-jatos.localhost}`)"
      - "traefik.http.routers.jatos.entrypoints=web"
      - "traefik.http.services.jatos.loadbalancer.server.port=9000"
