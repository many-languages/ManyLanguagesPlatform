# deploy/compose/services/cron-study-status.yml
#
# Scheduled job that opens/closes studies by startDate/endDate.
# Calls the app's /api/cron/study-status endpoint every 15 minutes.
# Requires the app service to be healthy before starting.

services:
  cron-study-status:
    image: alpine:latest
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      CRON_SECRET: ${CRON_SECRET:-}
      APP_URL: http://app:3000
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl
        echo "Study status cron started (every 15 min)"
        while true; do
          curl -s -H "X-Cron-Secret: $$CRON_SECRET" "$$APP_URL/api/cron/study-status" || true
          sleep 900
        done
