# deploy/compose/services/postgres.yml
#
# Canonical PostgreSQL definition for the Blitz/Next.js app.
# Not included by dev-jatos-only (app DB may run on the host).
# Host port defaults to 5433 to avoid conflicts with local PostgreSQL.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blitz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
      POSTGRES_DB: ${POSTGRES_DB:-manylanguagesplatform}
      POSTGRES_INITDB_ARGS: "-c log_connections=off -c log_disconnections=off -c log_min_messages=warning"
    command:
      - postgres
      - -c
      - log_connections=off
      - -c
      - log_disconnections=off
      - -c
      - log_min_messages=warning
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      retries: 10
      timeout: 5s
      start_period: 5s

volumes:
  postgres-data:
